<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>ABU Robocon 2026 — Robot Analysis</title>
<style>
  :root{
    --bg:#0d1117;--panel:#161b22;--panel2:#1c232d;--line:#2d3640;
    --txt:#e6edf3;--mut:#8b949e;--acc:#58e1c4;--acc2:#f0883e;--danger:#f85149;
    --green:#3fb950;--yellow:#d29922;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Courier New',monospace;background:var(--bg);color:var(--txt);
    padding:28px;background-image:radial-gradient(circle at 90% 0%,rgba(88,225,196,.08),transparent 40%);min-height:100vh}
  h1{font-size:26px;letter-spacing:2px;margin-bottom:4px}
  h1 span{color:var(--acc)}
  .sub{color:var(--mut);font-size:13px;margin-bottom:24px}

  /* top header with logo */
  .top-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
  .top-header-left{display:flex;flex-direction:column;gap:4px}
  .top-title{font-size:26px;font-weight:bold;letter-spacing:2px;color:var(--txt)}
  .top-title span{color:var(--acc)}
  .top-subtitle{color:var(--mut);font-size:12px;letter-spacing:1px}
  .top-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
  .top-logo{height:90px;width:auto;object-fit:contain;filter:drop-shadow(0 0 12px rgba(88,225,196,.25))}
  .top-logo-label{font-size:10px;font-weight:bold;letter-spacing:3px;color:var(--acc);text-transform:uppercase}
  .bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
  input,button{font-family:inherit;font-size:14px;border-radius:6px;border:1px solid var(--line);
    background:var(--panel);color:var(--txt);padding:10px 14px}
  input:focus{outline:none;border-color:var(--acc)}
  button{cursor:pointer;transition:.15s;font-weight:bold;letter-spacing:1px}
  .btn-add{background:var(--acc);color:#06251e;border-color:var(--acc)}
  .btn-add:hover{filter:brightness(1.15)}
  .btn-csv{background:var(--acc2);color:#2b1402;border-color:var(--acc2);margin-left:auto}
  .btn-csv:hover{filter:brightness(1.15)}

  .team{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:20px;overflow:hidden}
  .team-head{display:flex;align-items:center;gap:12px;padding:14px 18px;
    background:linear-gradient(90deg,rgba(88,225,196,.12),transparent);border-bottom:1px solid var(--line)}
  .team-name{font-size:18px;font-weight:bold;color:var(--acc);letter-spacing:1px}
  .del{background:transparent;border:1px solid var(--danger);color:var(--danger);padding:6px 12px;font-size:12px}
  .del:hover{background:var(--danger);color:#fff}
  .team-chevron{font-size:12px;color:var(--mut);margin-left:4px}
  .finish-btn{background:var(--acc);color:#06251e;border:none;padding:6px 14px;font-size:12px;font-weight:bold;letter-spacing:1px;border-radius:6px;cursor:pointer;margin-left:auto}
  .finish-btn:hover{filter:brightness(1.15)}

  /* phase tabs */
  .tabs{display:flex;border-bottom:1px solid var(--line)}
  .tab{padding:10px 20px;font-size:12px;letter-spacing:1px;cursor:pointer;border:none;
    background:transparent;color:var(--mut);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:var(--acc);border-bottom-color:var(--acc)}
  .tab-content{display:none;padding:20px}
  .tab-content.active{display:block}

  /* spear phase layout */
  .spear-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:700px){.spear-grid{grid-template-columns:1fr}}
  .round-box{background:var(--panel2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .round-label{padding:10px 16px;font-size:12px;font-weight:bold;letter-spacing:2px;border-bottom:1px solid var(--line)}
  .r1-label{background:rgba(240,136,62,.12);color:var(--acc2)}
  .r2-label{background:rgba(88,225,196,.10);color:var(--acc)}
  .round-body{padding:14px}

  /* task row */
  .task{margin-bottom:14px}
  .task-name{font-size:11px;color:var(--mut);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
  .task-row{display:flex;align-items:center;gap:10px}
  .timer-display{font-size:22px;font-weight:bold;min-width:90px;letter-spacing:2px;color:var(--txt)}
  .timer-display.running{color:var(--green);animation:blink 1s step-start infinite}
  @keyframes blink{50%{opacity:.5}}
  .btn-timer{padding:8px 14px;font-size:11px;min-width:80px;text-align:center}
  .btn-start{background:var(--green);color:#061a0a;border-color:var(--green)}
  .btn-stop{background:var(--danger);color:#fff;border-color:var(--danger)}
  .btn-reset{background:transparent;border:1px solid var(--line);color:var(--mut);padding:8px 10px;font-size:11px}
  .btn-reset:hover{border-color:var(--mut)}

  /* assemble section */
  .assemble-section{margin-top:6px;padding-top:14px;border-top:1px solid var(--line)}
  .assemble-label{font-size:11px;color:var(--yellow);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .assemble-shared{margin-top:16px;padding:16px;background:rgba(210,153,34,.07);
    border:1px solid rgba(210,153,34,.3);border-radius:8px}
  .assemble-shared-label{font-size:11px;color:var(--yellow);letter-spacing:1px;
    text-transform:uppercase;margin-bottom:10px;font-weight:bold}
  .count-row{display:flex;align-items:center;gap:24px;margin-top:14px;flex-wrap:wrap}
  .count-block,.score-block{display:flex;flex-direction:column;gap:6px}
  .count-label{font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
  .count-ctrl{display:flex;align-items:center;gap:6px}
  .cnt-btn{padding:6px 14px;font-size:16px;background:var(--panel);border:1px solid var(--line);
    color:var(--txt);border-radius:6px;cursor:pointer;line-height:1}
  .cnt-btn:hover{border-color:var(--yellow);color:var(--yellow)}
  .count-input{width:60px;text-align:center;font-size:18px;font-weight:bold;padding:6px 8px}
  .score-val{font-size:32px;font-weight:bold;color:var(--yellow);letter-spacing:2px;line-height:1}
  .score-formula{font-size:10px;color:var(--mut)}


  /* phase section label */
  .phase-section-label{font-size:11px;font-weight:bold;letter-spacing:2px;color:var(--mut);
    text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}

  /* spear circles GUI */
  .spear-circles-wrap{margin-bottom:20px;padding:16px;background:var(--panel2);border:1px solid var(--line);border-radius:8px}
  .spear-circles-label{font-size:11px;font-weight:bold;letter-spacing:2px;color:var(--acc2);text-transform:uppercase;margin-bottom:14px}
  .spear-circles-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
  .spear-circle-slot{display:flex;flex-direction:column;align-items:center;gap:8px}
  .spear-circle{width:90px;height:90px;overflow:hidden;border-radius:50%;border:3px solid var(--line);background:var(--bg);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:bold;letter-spacing:1px;color:var(--mut);
    transition:border-color .15s, background .15s, box-shadow .15s;position:relative;user-select:none}
  .spear-circle:hover{border-color:var(--acc2);color:var(--acc2)}
  .spear-circle.running{border-color:var(--green);background:rgba(63,185,80,.12);color:var(--green);
    box-shadow:0 0 12px rgba(63,185,80,.4);animation:pulse-circle 1s ease-in-out infinite}
  .spear-circle.locked{opacity:0.35;cursor:not-allowed;pointer-events:none}
  @keyframes pulse-circle{0%,100%{box-shadow:0 0 8px rgba(63,185,80,.3)}50%{box-shadow:0 0 20px rgba(63,185,80,.6)}}
  .spear-circle-img{width:100%;height:100%;object-fit:cover;border-radius:50%;pointer-events:none;opacity:0.85}
  .spear-circle-overlay{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;background:rgba(0,0,0,.45)}
  .spear-circle-time{font-size:11px;color:var(--mut);letter-spacing:1px;min-width:90px;text-align:center}
  .spear-circle-time.running{color:var(--green)}
  .spear-circle-time.done{color:var(--acc2)}
  .spear-circle-btns{display:flex;gap:6px;margin-top:2px}
  .spear-circle-reset{font-size:12px;background:transparent;border:1px solid var(--line);color:var(--mut);
    padding:6px 12px;border-radius:6px;cursor:pointer;letter-spacing:0;font-weight:bold}
  .spear-circle-reset:hover{border-color:var(--txt);color:var(--txt)}
  .spear-circle-cancel{font-size:12px;background:transparent;border:1px solid var(--danger);color:var(--danger);
    padding:6px 12px;border-radius:6px;cursor:pointer;letter-spacing:0;font-weight:bold}
  .spear-circle-cancel:hover{background:var(--danger);color:#fff}

  /* assemble laps */
  .lap-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .lap-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;
    background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:8px;font-size:15px}
  .lap-num{color:var(--mut);font-size:11px;letter-spacing:1px;min-width:40px}
  .lap-time{font-weight:bold;letter-spacing:2px;color:var(--txt);font-size:18px}
  .lap-del{background:var(--danger);border:none;color:#fff;cursor:pointer;padding:6px 14px;font-size:14px;border-radius:6px;font-weight:bold;letter-spacing:1px}
  .lap-del:hover{filter:brightness(1.2)}
  .conclusion-box{margin-top:14px;padding:14px;background:rgba(210,153,34,.07);
    border:1px solid rgba(210,153,34,.3);border-radius:8px;display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}
  .conclusion-block{display:flex;flex-direction:column;gap:4px}
  .conclusion-label{font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
  .conclusion-val{font-size:28px;font-weight:bold;color:var(--yellow);letter-spacing:2px;line-height:1}
  .conclusion-sub{font-size:10px;color:var(--mut)}

  /* pick order badge */
  .pick-badge{position:absolute;top:4px;right:4px;background:var(--yellow);color:#1a1000;
    font-size:10px;font-weight:bold;width:18px;height:18px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;z-index:2;line-height:1}

  /* pick sequence timeline */
  .pick-timeline{margin-top:16px;padding:14px 16px;background:var(--panel2);
    border:1px solid var(--line);border-radius:8px}
  .pick-timeline-label{font-size:11px;font-weight:bold;letter-spacing:2px;color:var(--yellow);
    text-transform:uppercase;margin-bottom:12px}
  .pick-sequence{display:flex;align-items:center;flex-wrap:wrap;gap:0}
  .pick-step{display:flex;align-items:center}
  .pick-node{display:flex;flex-direction:column;align-items:center;gap:4px}
  .pick-node-img{width:52px;height:52px;border-radius:50%;border:2px solid var(--yellow);
    overflow:hidden;background:var(--bg);position:relative}
  .pick-node-img img{width:100%;height:100%;object-fit:cover;opacity:0.9}
  .pick-node-num{font-size:10px;color:var(--yellow);font-weight:bold;letter-spacing:1px}
  .pick-node-name{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:1px}
  .pick-node-time{font-size:11px;color:var(--txt);font-weight:bold;letter-spacing:1px}
  .pick-node.running .pick-node-img{border-color:var(--green);box-shadow:0 0 8px rgba(63,185,80,.5);animation:pulse-circle 1s ease-in-out infinite}
  .pick-node.running .pick-node-num{color:var(--green)}
  .pick-arrow{font-size:18px;color:var(--line);margin:0 6px;padding-bottom:18px}
  .pick-empty{color:var(--mut);font-size:12px;font-style:italic}

  /* field position selector */
  .field-pos-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:4px}
  .field-pos-label{font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
  .field-pos-btns{display:flex;gap:4px}
  .field-pos-btn{width:28px;height:28px;border-radius:6px;border:2px solid var(--line);background:var(--bg);
    color:var(--mut);font-size:12px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
  .field-pos-btn:hover{border-color:var(--acc);color:var(--acc)}
  .field-pos-btn.active{border-color:var(--yellow);background:rgba(210,153,34,.2);color:var(--yellow)}
  .pick-node-pos{font-size:10px;font-weight:bold;letter-spacing:1px;
    background:var(--yellow);color:#1a1000;padding:2px 7px;border-radius:4px;margin-top:2px}

  /* rack slots */
  .rack-slots-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .rack-slot{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 6px;
    background:var(--bg);border:2px solid var(--line);border-radius:8px;min-width:72px;transition:.15s}
  .rack-slot.rack-picked{border-color:var(--yellow);background:rgba(210,153,34,.08)}
  .rack-slot.rack-running{border-color:var(--green);background:rgba(63,185,80,.08);animation:pulse-circle 1s ease-in-out infinite}
  .rack-slot-num{font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
  .rack-slot-img-wrap{position:relative;width:50px;height:50px;border-radius:50%;overflow:hidden;border:2px solid var(--line)}
  .rack-slot.rack-picked .rack-slot-img-wrap{border-color:var(--yellow)}
  .rack-slot.rack-running .rack-slot-img-wrap{border-color:var(--green)}
  .rack-slot-img-wrap img{width:100%;height:100%;object-fit:cover}
  .rack-pick-order{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);font-size:20px;font-weight:bold;color:var(--yellow)}
  .rack-slot-type{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:1px}
  .rack-slot-time{font-size:11px;font-weight:bold;color:var(--txt);letter-spacing:1px}
  .rack-slot.rack-picked .rack-slot-time{color:var(--yellow)}

  /* path row */
  .path-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-top:6px}
  .path-item{display:flex;flex-direction:column;align-items:center;gap:3px}
  .path-order{font-size:10px;font-weight:bold;background:var(--yellow);color:#1a1000;
    width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .path-slot-img{width:44px;height:44px;border-radius:50%;overflow:hidden;border:2px solid var(--yellow)}
  .path-slot-img img{width:100%;height:100%;object-fit:cover}
  .path-slot-label{font-size:9px;color:var(--yellow);font-weight:bold;letter-spacing:1px}
  .path-slot-type{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:1px}
  .path-slot-time{font-size:10px;color:var(--txt);font-weight:bold}
  .path-arrow{font-size:20px;color:var(--acc);padding-bottom:20px;font-weight:bold}

  /* forest & place phase */
  .fp-section-label{font-size:11px;font-weight:bold;letter-spacing:2px;color:var(--mut);
    text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .forest-card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .forest-card.confirmed{opacity:1}
  .forest-card-head{padding:10px 16px;font-size:12px;font-weight:bold;letter-spacing:2px;border-bottom:1px solid var(--line)}
  .forest-card-body{padding:16px;display:flex;flex-direction:column;gap:14px}
  .fc-timer-label{font-size:11px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
  .fc-timer-row{display:flex;align-items:center;gap:10px}
  .fc-blocks-section{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:6px;padding:12px}
  .fc-blocks-row{display:flex;align-items:center;gap:10px;margin-top:4px}
  .fc-live-score{font-size:14px;color:var(--mut);margin-left:8px}
  .btn-confirm-forest{width:100%;padding:12px;background:linear-gradient(135deg,var(--green),var(--acc));
    color:#06251e;border:none;border-radius:8px;font-size:13px;font-weight:bold;letter-spacing:1px;
    cursor:pointer;transition:.15s}
  .btn-confirm-forest:hover{filter:brightness(1.1)}
  .forest-confirmed-row{display:flex;gap:16px;flex-wrap:wrap}
  .fc-stat{display:flex;flex-direction:column;gap:3px;flex:1;min-width:70px;
    background:rgba(255,255,255,.04);padding:10px;border-radius:6px;text-align:center}
  .fc-stat-label{font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
  .fc-stat-val{font-size:22px;font-weight:bold;letter-spacing:1px}
  .fc-stat-sub{font-size:9px;color:var(--mut)}
  .btn-unconfirm{background:transparent;border:1px solid var(--line);color:var(--mut);
    padding:6px 14px;border-radius:6px;font-size:11px;cursor:pointer;letter-spacing:1px}
  .btn-unconfirm:hover{border-color:var(--txt);color:var(--txt)}

  /* place phase */
  .place-section{display:flex;flex-direction:column;gap:14px}
  .place-ttc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  @media(max-width:700px){.place-ttc-grid{grid-template-columns:1fr}}
  .place-row-card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    padding:14px;display:flex;flex-direction:column;gap:8px;align-items:center;text-align:center}
  .place-row-head{font-size:11px;font-weight:bold;letter-spacing:1px;text-transform:uppercase}
  .place-row-sub{font-size:10px;color:var(--mut)}
  .place-row-ctrl{display:flex;align-items:center;gap:8px}
  .place-row-score{font-size:24px;font-weight:bold;letter-spacing:2px}
  .place-total-bar{display:flex;align-items:center;justify-content:center;gap:12px;
    padding:16px;background:rgba(210,153,34,.07);border:1px solid rgba(210,153,34,.3);border-radius:8px}

  .ttc-cell.ttc-threat{border-color:var(--danger)!important;background:rgba(248,81,73,.15)!important;animation:threat-pulse 1.2s ease-in-out infinite}
  @keyframes threat-pulse{0%,100%{box-shadow:0 0 6px rgba(248,81,73,.3)}50%{box-shadow:0 0 18px rgba(248,81,73,.7)}}
  .ttc-threat-btn{font-size:11px;background:rgba(255,255,255,.08);border:1px solid var(--line);
    border-radius:4px;padding:1px 5px;cursor:pointer;color:var(--mut);transition:.12s}
  .ttc-threat-btn:hover,.ttc-threat-btn.active{background:rgba(248,81,73,.2);border-color:var(--danger);color:var(--danger)}
  .ttc-remove{font-size:11px;background:rgba(255,255,255,.08);border:1px solid var(--line);
    border-radius:4px;padding:1px 5px;cursor:pointer;color:var(--mut);transition:.12s}
  .ttc-remove:hover{background:rgba(248,81,73,.2);border-color:var(--danger);color:var(--danger)}
  .ttc-threat-banner{background:rgba(248,81,73,.12);border:1px solid var(--danger);border-radius:8px;
    padding:10px 14px;margin-bottom:12px;font-size:11px;font-weight:bold;color:var(--danger);
    letter-spacing:1px;text-align:center;animation:threat-pulse 1.2s ease-in-out infinite}

  /* tic-tac-toe grid */
  .ttc-wrap{display:flex;gap:10px;align-items:flex-start;margin-bottom:14px}
  .ttc-left{display:flex;flex-direction:column;gap:0}
  .ttc-row-labels{display:flex;flex-direction:column;gap:0}
  .ttc-row-label{display:flex;flex-direction:column;justify-content:center;gap:3px;
    height:110px;padding:0 10px 0 0;border-right:2px solid var(--line);min-width:85px}
  .ttc-row-warn-btn{background:transparent;border:1px solid var(--line);color:var(--mut);
    padding:4px 6px;border-radius:5px;font-size:10px;font-weight:bold;letter-spacing:1px;
    cursor:pointer;transition:.12s;font-family:inherit;width:100%;margin-top:2px}
  .ttc-row-warn-btn:hover{border-color:var(--danger);color:var(--danger);background:rgba(248,81,73,.1)}
  .ttc-row-warn-btn.active{border-color:var(--danger);color:var(--danger);background:rgba(248,81,73,.15)}
  .ttc-row-warn-btn.disabled{opacity:0.3;cursor:not-allowed}
  .ttc-row-name{font-size:10px;font-weight:bold;letter-spacing:1px;text-transform:uppercase}
  .ttc-row-pts{font-size:18px;font-weight:bold}
  .ttc-row-robot{font-size:9px;color:var(--mut);letter-spacing:1px}
  .ttc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;flex:1}
  .ttc-cell{height:110px;border:2px solid var(--line);border-radius:8px;background:var(--bg);
    cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:8px 6px 6px;transition:.15s;position:relative;user-select:none;overflow:hidden}
  .ttc-cell:hover{border-color:var(--acc);background:rgba(88,225,196,.05)}
  .ttc-cell.ttc-filled{cursor:default}
  .ttc-cell.ttc-win{box-shadow:0 0 16px rgba(210,153,34,.5);border-color:var(--yellow)!important;background:rgba(210,153,34,.1)!important}
  .ttc-cell-info{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;justify-content:center}
  .ttc-order{font-size:16px;font-weight:bold;letter-spacing:1px}
  .ttc-pts{font-size:13px;font-weight:bold}
  .ttc-robot{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;text-align:center}
  .ttc-cell-btns{display:flex;gap:4px;width:100%;justify-content:center}
  .ttc-threat-btn-vis{font-size:11px;flex:1;background:rgba(255,255,255,.06);border:1px solid var(--line);
    border-radius:4px;padding:3px 0;cursor:pointer;color:var(--mut);transition:.12s;text-align:center}
  .ttc-threat-btn-vis:hover,.ttc-threat-btn-vis.active{background:rgba(210,153,34,.2);border-color:var(--yellow);color:var(--yellow)}
  .ttc-remove-btn{font-size:11px;flex:1;background:rgba(255,255,255,.06);border:1px solid var(--line);
    border-radius:4px;padding:3px 0;cursor:pointer;color:var(--mut);transition:.12s;text-align:center}
  .ttc-remove-btn:hover{background:rgba(248,81,73,.2);border-color:var(--danger);color:var(--danger)}
  .ttc-empty-hint{font-size:10px;color:rgba(255,255,255,.15);letter-spacing:1px}
  .ttc-bottom{display:flex;gap:12px;flex-wrap:wrap}
  .ttc-order-panel,.ttc-score-panel{flex:1;min-width:160px;background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;padding:12px}
  .ttc-panel-label{font-size:10px;font-weight:bold;letter-spacing:2px;color:var(--mut);
    text-transform:uppercase;margin-bottom:8px}
  .ttc-order-list{display:flex;flex-direction:column;gap:5px}
  .ttc-order-entry{display:flex;align-items:center;gap:8px;font-size:12px}
  .ttc-order-num{font-size:10px;font-weight:bold;color:#0d1117;padding:2px 6px;border-radius:4px;min-width:24px;text-align:center}
  .ttc-tally{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
  .ttc-tally-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;gap:8px}
  .ttc-total{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;
    background:rgba(210,153,34,.07);border:1px solid rgba(210,153,34,.3);border-radius:6px}

  /* place/forest old CSS kept for compatibility */
  .place-section{display:flex;flex-direction:column;gap:14px}
  .place-total-bar{display:flex;align-items:center;justify-content:center;gap:12px;
    padding:16px;background:rgba(210,153,34,.07);border:1px solid rgba(210,153,34,.3);border-radius:8px}

  /* other phases placeholder */
  .placeholder{color:var(--mut);font-style:italic;font-size:13px;padding:10px 0}

  .notes-row{margin-top:8px}
  .notes-row input{width:100%;background:var(--bg);font-size:12px;padding:7px 10px}
  /* ── iPad / touch optimisation ─────────────────────────────────────────── */
  @media(max-width:1024px){
    body{padding:16px}
    .top-logo{height:64px}
    input,button{font-size:16px}
    .spear-circles-row{gap:8px;justify-content:center}
    .spear-circle{width:80px;height:80px}
    .ttc-cell{height:100px}
    .ttc-row-label{height:100px;min-width:72px}
    .rack-slot{min-width:60px}
    .rack-slot-img-wrap{width:44px;height:44px}
  }

  @media(max-width:768px){
    body{padding:12px}
    .top-title{font-size:18px}
    .top-logo{height:52px}
    .top-subtitle{font-size:10px}
    .spear-grid{grid-template-columns:1fr}
    .ttc-wrap{flex-direction:column;gap:8px}
    .ttc-left{flex-direction:row}
    .ttc-row-labels{flex-direction:row;gap:4px}
    .ttc-row-label{height:auto;width:100%;flex-direction:row;align-items:center;
      padding:6px 8px;border-right:none;border-bottom:2px solid var(--line);min-width:unset;gap:6px}
    .ttc-row-name{font-size:9px;min-width:52px}
    .ttc-row-pts{font-size:13px;min-width:36px}
    .ttc-row-robot{display:none}
    .ttc-row-warn-btn{margin-top:0;width:auto;padding:4px 10px}
    .ttc-cell{height:90px}
    .ttc-bottom{flex-direction:column}
    .spear-circles-row{gap:6px;justify-content:center}
    .spear-circle{width:72px;height:72px}
    .rack-slots-row{gap:6px}
    .rack-slot{min-width:52px;padding:6px 4px}
    .tabs{overflow-x:auto}
    .tab{padding:10px 14px;font-size:11px;white-space:nowrap}
  }

  @media(pointer:coarse){
    button,.cnt-btn,.ttc-remove-btn,.ttc-row-warn-btn,.spear-circle{min-height:44px}
    .cnt-btn{min-width:44px}
    .ttc-remove-btn{padding:8px 12px;font-size:13px}
    .lap-del{padding:10px 18px;font-size:14px}
    .btn-timer{padding:12px 18px;font-size:13px}
    .tab{padding:12px 18px}
    input[type=number]{font-size:16px}
  }
</style>
</head>

  if(teams.some(t=>t.name.toLowerCase()===name.toLowerCase())){ alert('Team already exists'); return; }
  teams.push(makeTeam(name));
  i.value='';
  render();
}

function delTeam(idx){
  Object.keys(intervals).filter(k=>k.startsWith(`ti-${idx}-`)).forEach(k=>{ clearInterval(intervals[k]); delete intervals[k]; });
  teams.splice(idx,1);
  render();
}

function resetTeam(idx){
  // clear all running intervals for this team
  Object.keys(intervals).filter(k=>k.startsWith(`ti-${idx}-`)).forEach(k=>{ clearInterval(intervals[k]); delete intervals[k]; });
  const name = teams[idx].name;
  const tab  = teams[idx].activeTab;
  // rebuild fresh state keeping name and active tab
  teams[idx] = makeTeam(name);
  teams[idx].activeTab = tab;
  render();
}

function setTab(idx, tab){
  teams[idx].activeTab = tab;
  render();
}

// ── timer logic ───────────────────────────────────────────────────────────────
function msToDisplay(ms){
  const s = Math.floor(ms/1000);
  const ms3 = ms % 1000;
  return String(s).padStart(2,'0') + '.' + String(ms3).padStart(3,'0');
}

// round=null means shared assemble
function getTask(idx, round, taskKey){
  return round ? teams[idx].spear[round][taskKey] : teams[idx].spear[taskKey];
}

function toggleTimer(idx, round, taskKey){
  // assemble uses lap logic
  if(!round && taskKey === 'assemble'){
    const asm = teams[idx].spear.assemble;
    const key = `ti-${idx}-assemble`;
    if(asm.running){
      clearInterval(intervals[key]);
      delete intervals[key];
      asm.running = false;
      // save lap
      if(asm.ms > 0){
        asm.laps.push(asm.ms);
        asm.count = asm.laps.length;
      }
      asm.ms = 0; asm.display = '00.000';
    } else {
      const startWall = Date.now();
      intervals[key] = setInterval(()=>{
        asm.ms = Date.now() - startWall;
        asm.display = msToDisplay(asm.ms);
        updateTimerDisplay(idx, null, 'assemble');
      }, 50);
      asm.running = true;
    }
    render();
    return;
  }
  const task = getTask(idx, round, taskKey);
  const key = round ? `ti-${idx}-${round}-${taskKey}` : `ti-${idx}-${taskKey}`;
  if(task.running){
    clearInterval(intervals[key]);
    delete intervals[key];
    task.running = false;
  } else {
    const startWall = Date.now() - task.ms;
    intervals[key] = setInterval(()=>{
      task.ms = Date.now() - startWall;
      task.display = msToDisplay(task.ms);
      updateTimerDisplay(idx, round, taskKey);
    }, 50);
    task.running = true;
  }
  render();
}

function deleteLap(idx, li){
  const asm = teams[idx].spear.assemble;
  asm.laps.splice(li, 1);
  asm.count = asm.laps.length;
  render();
}

function resetAssemble(idx){
  const key = `ti-${idx}-assemble`;
  if(intervals[key]){ clearInterval(intervals[key]); delete intervals[key]; }
  const asm = teams[idx].spear.assemble;
  asm.ms = 0; asm.running = false; asm.display = '00.000'; asm.laps = []; asm.count = 0;
  render();
}

function resetTimer(idx, round, taskKey){
  const key = round ? `ti-${idx}-${round}-${taskKey}` : `ti-${idx}-${taskKey}`;
  if(intervals[key]){ clearInterval(intervals[key]); delete intervals[key]; }
  const task = getTask(idx, round, taskKey);
  task.ms = 0; task.running = false; task.display = '00.000';
  render();
}

function updateTimerDisplay(idx, round, taskKey){
  const dispId = round ? `disp-${idx}-${round}-${taskKey}` : `disp-${idx}-${taskKey}`;
  const btnId  = round ? `btn-${idx}-${round}-${taskKey}`  : `btn-${idx}-${taskKey}`;
  const el  = document.getElementById(dispId);
  const btn = document.getElementById(btnId);
  const task = getTask(idx, round, taskKey);
  if(el)  el.textContent = task.display;
  if(btn){
    btn.textContent = task.running ? '⏹ STOP' : '▶ START';
    btn.className = 'btn-timer ' + (task.running ? 'btn-stop' : 'btn-start');
  }
}

function updNotes(idx, phase, round, val){ teams[idx][phase][round].notes = val; }
function updCount(idx, val){ 
  // count is driven by laps, manual edit only if no laps
  const asm = teams[idx].spear.assemble;
  if(asm.laps.length === 0) asm.count = Math.max(0, parseInt(val)||0); 
  render(); 
}






function toggleCircle(idx, ci){
  const c = teams[idx].spear.circles[ci];
  const key = `ti-${idx}-circle-${ci}`;
  if(c.running){
    // stop this circle
    clearInterval(intervals[key]);
    delete intervals[key];
    c.running = false;
  } else {
    // block if another circle is currently running
    const anyRunning = teams[idx].spear.circles.some((other, oi) => oi !== ci && other.running);
    if(anyRunning) return; // must stop current one first
    // assign pick order on first start
    if(c.ms === 0 && c.pickOrder === 0){
      teams[idx].spear.pickSeq++;
      c.pickOrder = teams[idx].spear.pickSeq;
    }
    const startWall = Date.now() - c.ms;
    intervals[key] = setInterval(()=>{
      c.ms = Date.now() - startWall;
      c.display = msToDisplay(c.ms);
      const el = document.getElementById(`circle-time-${idx}-${ci}`);
      const cv = document.getElementById(`circle-${idx}-${ci}`);
      if(el) el.textContent = c.display;
      if(cv){ cv.className = 'spear-circle running'; cv.querySelector('.spear-circle-overlay').textContent = '⏹'; }
    }, 50);
    c.running = true;
  }
  render();
}

function resetCircle(idx, ci){
  const key = `ti-${idx}-circle-${ci}`;
  if(intervals[key]){ clearInterval(intervals[key]); delete intervals[key]; }
  const c = teams[idx].spear.circles[ci];
  c.ms = 0; c.running = false; c.display = '00.000'; c.pickOrder = 0; c.fieldPos = 0;
  render();
}

function cancelCircle(idx, ci){
  const key = `ti-${idx}-circle-${ci}`;
  if(intervals[key]){ clearInterval(intervals[key]); delete intervals[key]; }
  const c = teams[idx].spear.circles[ci];
  c.ms = 0; c.running = false; c.display = '00.000'; c.pickOrder = 0; c.fieldPos = 0;
  render();
}

function updFieldPos(idx, ci, val){
  teams[idx].spear.circles[ci].fieldPos = parseInt(val)||0;
  render();
}

// ── forest & place logic ──────────────────────────────────────────────────────
function toggleForestTimer(idx, robot){
  const f = teams[idx].forest[robot];
  if(f.confirmed) return; // locked after confirm
  const key = `ti-${idx}-forest-${robot}`;
  if(f.running){
    clearInterval(intervals[key]); delete intervals[key];
    f.running = false;
  } else {
    const startWall = Date.now() - f.ms;
    intervals[key] = setInterval(()=>{
      f.ms = Date.now() - startWall;
      f.display = msToDisplay(f.ms);
      const el = document.getElementById(`fdisp-${idx}-${robot}`);
      const btn = document.getElementById(`fbtn-${idx}-${robot}`);
      if(el) el.textContent = f.display;
      if(btn){ btn.textContent='⏹ STOP'; btn.className='btn-timer btn-stop'; }
    }, 50);
    f.running = true;
  }
  render();
}

function resetForestTimer(idx, robot){
  if(teams[idx].forest[robot].confirmed) return;
  const key = `ti-${idx}-forest-${robot}`;
  if(intervals[key]){ clearInterval(intervals[key]); delete intervals[key]; }
  teams[idx].forest[robot] = { ms:0, running:false, display:'00.000', blocks:0, confirmed:false, score:0 };
  render();
}

function updForestBlocks(idx, robot, val){
  if(teams[idx].forest[robot].confirmed) return;
  teams[idx].forest[robot].blocks = Math.max(0, Math.min(12, parseInt(val)||0));
  render();
}

function confirmForest(idx, robot){
  const f = teams[idx].forest[robot];
  if(f.running){
    const key = `ti-${idx}-forest-${robot}`;
    clearInterval(intervals[key]); delete intervals[key];
    f.running = false;
  }
  f.confirmed = true;
  f.score = f.blocks * 10;
  render();
}

function unconfirmForest(idx, robot){
  teams[idx].forest[robot].confirmed = false;
  teams[idx].forest[robot].score = 0;
  render();
}

function placeKFS(idx, cell){
  const pl = teams[idx].place;
  if(pl.grid[cell]) return;
  const row = Math.floor(cell / 3);
  const rowInfo = [
    { label:'TOP',    pts:80, robot:'R2 LIFTED', color:'var(--green)' },
    { label:'MIDDLE', pts:40, robot:'R2 MANUAL', color:'var(--acc)'   },
    { label:'BOTTOM', pts:30, robot:'R1 AUTO',   color:'var(--acc2)'  }
  ][row];
  pl.seq++;
  pl.grid[cell] = { order: pl.seq, ...rowInfo, threatened: pl.rowThreat[row] || false };
  render();
}

function removeKFS(idx, cell){
  const pl = teams[idx].place;
  if(!pl.grid[cell]) return;
  pl.grid[cell] = null;
  // re-number remaining in order
  const placed = pl.grid.map((c,i)=>c?{...c,i}:null).filter(Boolean).sort((a,b)=>a.order-b.order);
  placed.forEach((c,n)=>{ pl.grid[c.i].order = n+1; });
  pl.seq = placed.length;
  render();
}

function resetPlaceGrid(idx){
  teams[idx].place = { grid: Array(9).fill(null), seq: 0, rowThreat: [false, false, false] };
  render();
}

function toggleThreat(idx, cell, e){
  e.stopPropagation();
  const c = teams[idx].place.grid[cell];
  if(!c) return;
  c.threatened = !c.threatened;
  render();
}

function toggleRowThreat(idx, row){
  const pl = teams[idx].place;
  pl.rowThreat[row] = !pl.rowThreat[row];
  // also sync any filled cells in this row
  [0,1,2].forEach(c => {
    const cell = pl.grid[row*3+c];
    if(cell) cell.threatened = pl.rowThreat[row];
  });
  render();
}

function renderPlacePhase(idx){
  const pl = teams[idx].place;
  const rowDefs = [
    { label:'TOP ROW',    pts:80, robot:'R2 LIFTED', color:'var(--green)',  bg:'rgba(63,185,80,.12)'  },
    { label:'MIDDLE ROW', pts:40, robot:'R2 MANUAL', color:'var(--acc)',    bg:'rgba(88,225,196,.10)' },
    { label:'BOTTOM ROW', pts:30, robot:'R1 AUTO',   color:'var(--acc2)',   bg:'rgba(240,136,62,.12)' }
  ];

  // check win (3 in col or diagonal — all same team not relevant here, just 3 filled)
  const g = pl.grid;
  const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const winLine = lines.find(l => l.every(i => g[i]));

  const cellsHTML = Array.from({length:9},(_, cell) => {
    const row = Math.floor(cell/3);
    const rd = rowDefs[row];
    const c = g[cell];
    const isWin = winLine && winLine.includes(cell);
    const rowThreatened = pl.rowThreat && pl.rowThreat[row];
    const isThreat = (c && c.threatened) || rowThreatened;
    return `
    <div class="ttc-cell ${c?'ttc-filled':''} ${isWin?'ttc-win':''} ${isThreat?'ttc-threat':''}"
      style="${isThreat ? '' : (c ? `border-color:${rd.color};background:${rd.bg}` : '')}"
      onclick="${c ? '' : `placeKFS(${idx},${cell})`}">
      ${c ? `
        <div class="ttc-cell-info">
          <div class="ttc-order" style="color:${isThreat?'var(--danger)':rd.color}">#${c.order}</div>
          <div class="ttc-pts" style="color:${isThreat?'var(--danger)':rd.color}">${c.pts}pts</div>
          <div class="ttc-robot">${isThreat?'⚠ CAN PUSH OUT':c.robot}</div>
        </div>
        <div class="ttc-cell-btns">
          <div class="ttc-remove-btn" onclick="removeKFS(${idx},${cell});event.stopPropagation()">✕</div>
        </div>
      ` : `<div class="ttc-empty-hint" style="${rowThreatened?'color:var(--danger);font-weight:bold':''}">${rowThreatened?'⚠ DANGER':'tap'}</div>`}
    </div>`;
  }).join('');

  // row labels on the side
  const rowLabelsHTML = rowDefs.map((rd,r) => {
    const rowThreatened = pl.rowThreat && pl.rowThreat[r];
    return `
    <div class="ttc-row-label" style="color:${rowThreatened?'var(--danger)':rd.color}">
      <div class="ttc-row-name">${rd.label}</div>
      <div class="ttc-row-pts">${rd.pts} pts</div>
      <div class="ttc-row-robot">${rd.robot}</div>
      <button class="ttc-row-warn-btn ${rowThreatened?'active':''}"
        onclick="toggleRowThreat(${idx},${r})">
        ⚔ ${rowThreatened?'WARNING':'WARN'}
      </button>
    </div>`;
  }).join('');

  // score tally
  let total = 0;
  const tally = rowDefs.map((rd,r) => {
    const count = [0,1,2].filter(c => g[r*3+c]).length;
    const score = count * rd.pts;
    total += score;
    return `<div class="ttc-tally-row">
      <span style="color:${rd.color}">${rd.label}</span>
      <span style="color:var(--mut)">${count} × ${rd.pts}</span>
      <span style="font-weight:bold;color:var(--yellow)">${score} pts</span>
    </div>`;
  }).join('');

  // place order list
  const placed = pl.grid.map((c,i)=>c?{...c,i}:null).filter(Boolean).sort((a,b)=>a.order-b.order);
  const orderList = placed.length ? placed.map(c=>{
    const rd = rowDefs[Math.floor(c.i/3)];
    const col = (c.i%3)+1;
    return `<div class="ttc-order-entry">
      <span class="ttc-order-num" style="background:${rd.color}">#${c.order}</span>
      <span style="color:${rd.color}">${rd.label}</span>
      <span style="color:var(--mut)">COL ${col}</span>
      <span style="color:var(--txt);font-weight:bold">${c.pts} pts</span>
    </div>`;
  }).join('') : `<div style="color:var(--mut);font-style:italic;font-size:12px">Tap cells to place KFS</div>`;

  const threatCount = g.filter(c => c && c.threatened).length;
  const rowThreatCount = (pl.rowThreat||[]).filter(Boolean).length;
  const threatBanner = (threatCount > 0 || rowThreatCount > 0) ? `
  <div class="ttc-threat-banner">
    ⚔ SPEAR THREAT — ${rowThreatCount > 0 ? rowThreatCount+' ROW(S) MARKED' : ''} ${threatCount > 0 ? '· '+threatCount+' KFS CAN BE PUSHED OUT' : ''} · TAP ⚔ TO TOGGLE
  </div>` : '';

  return `
  ${threatBanner}
  <div class="ttc-wrap">
    <div class="ttc-left">
      <div class="ttc-row-labels">${rowLabelsHTML}</div>
    </div>
    <div class="ttc-grid">${cellsHTML}</div>
  </div>
  <div class="ttc-bottom">
    <div class="ttc-order-panel">
      <div class="ttc-panel-label">📍 PLACE ORDER</div>
      <div class="ttc-order-list">${orderList}</div>
    </div>
    <div class="ttc-score-panel">
      <div class="ttc-panel-label">🏆 SCORE</div>
      <div class="ttc-tally">${tally}</div>
      <div class="ttc-total">
        <span style="color:var(--mut);font-size:11px;letter-spacing:1px">TOTAL</span>
        <span style="color:var(--yellow);font-size:32px;font-weight:bold">${total}</span>
        <span style="color:var(--mut);font-size:11px">pts</span>
      </div>
      <button onclick="resetPlaceGrid(${idx})" style="margin-top:8px;width:100%;padding:7px;background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:6px;font-size:11px;cursor:pointer;letter-spacing:1px" onmouseover="this.style.borderColor='var(--danger)';this.style.color='var(--danger)'" onmouseout="this.style.borderColor='var(--line)';this.style.color='var(--mut)'">↺ RESET GRID</button>
    </div>
  </div>`;
}

  <div class="spear-grid" style="margin-bottom:20px">

// ── render ────────────────────────────────────────────────────────────────────
function renderSpear(idx){
  const s = teams[idx].spear;
  const asm = s.assemble;
  const runAsm = asm.running;
  const anyRunning = s.circles.some(c => c.running);
  const circlesHTML = s.circles.map((c,ci)=>{
    const state = c.running ? 'running' : (c.ms > 0 ? 'done' : '');
    const locked = !c.running && anyRunning ? 'locked' : '';
    const overlayIcon = c.running ? '⏹' : (c.ms > 0 ? '✓' : '▶');
    const overlayStyle = c.running
      ? 'color:var(--green)'
      : (c.ms > 0 ? 'color:var(--acc2)' : 'color:rgba(255,255,255,.5)');

        ${c.running ? `<button class="spear-circle-cancel" onclick="cancelCircle(${idx},${ci})">✕ CANCEL</button>` : ''}
      </div>
    </div>`;
  }).join('');
  // assemble laps
  const lapsHTML = asm.laps.length ? asm.laps.map((ms,li)=>`
    <div class="lap-row">

      <span class="lap-time">${msToDisplay(ms)}</span>

    </div>`).join('') : `<div style="color:var(--mut);font-size:12px;font-style:italic">No laps yet — start timer to record</div>`;
  const avgMs = asm.laps.length ? asm.laps.reduce((a,b)=>a+b,0)/asm.laps.length : 0;
  const score = asm.laps.length * 10;
  const conclusionHTML = `
  <div class="conclusion-box">

      <div class="conclusion-val">${asm.laps.length}</div>

      <div class="conclusion-val" style="color:var(--green)">${score}</div>
      <div class="conclusion-sub">total points</div>
    </div>

  // slot path tracker
  const allSlots = s.circles.map((c,ci) => ({...c, ci}));
  const picked = allSlots.filter(c => c.pickOrder > 0).sort((a,b) => a.pickOrder - b.pickOrder);

  // rack slots display — show all 6 slots with pick order overlaid
  const rackslotsHTML = allSlots.map((c,ci) => {
    const lbl = CIRCLE_LABELS[ci];
    const isPicked = c.pickOrder > 0;
    const isRunning = c.running;
    return `
    <div class="rack-slot ${isPicked?'rack-picked':''} ${isRunning?'rack-running':''}">
      <div class="rack-slot-num">SLOT ${ci+1}</div>
      <div class="rack-slot-img-wrap">
        <img src="${CIRCLE_IMGS[ci]}" alt="${lbl}">
        ${isPicked ? `<div class="rack-pick-order">${c.pickOrder}</div>` : ''}
      </div>
      <div class="rack-slot-type">${lbl}</div>
      <div class="rack-slot-time">${isPicked ? (isRunning ? '▶…' : c.display) : '—'}</div>
    </div>`;
  }).join('');

  // path row: slots in the order they were picked
  const pathHTML = picked.length ? `
    <div class="path-row">
      ${picked.map((c,i) => `
        <div class="path-item">
          <div class="path-order">${c.pickOrder}</div>
          <div class="path-slot-img"><img src="${CIRCLE_IMGS[c.ci]}" alt="${CIRCLE_LABELS[c.ci]}"></div>
          <div class="path-slot-label">SLOT ${c.ci+1}</div>
          <div class="path-slot-type">${CIRCLE_LABELS[c.ci]}</div>
          <div class="path-slot-time">${c.running ? '▶…' : c.display}</div>
        </div>
        ${i < picked.length-1 ? '<div class="path-arrow">→</div>' : ''}
      `).join('')}
    </div>` : `<div class="pick-empty">Pick a slot above to track the path</div>`;

  return `
  <div class="spear-circles-wrap">
    <div class="spear-circles-label">⚔ SPEARHEAD SLOTS — CLICK TO START / STOP</div>
    <div class="spear-circles-row">${circlesHTML}</div>
  </div>
  <div class="pick-timeline">
    <div class="pick-timeline-label">🗺 SPEARHEAD RACK — PICK ORDER</div>
    <div class="rack-slots-row">${rackslotsHTML}</div>
    <div class="pick-timeline-label" style="margin-top:14px">📍 PATH: SLOT ORDER PICKED</div>
    ${pathHTML}
  </div>
  <div class="assemble-shared">
    <div class="assemble-shared-label">⚙ ASSEMBLE — SHARED TIMER (R1 AUTO + R2 MANUAL)</div>
    <div class="task-row">
      <span id="disp-${idx}-assemble" class="timer-display${runAsm?' running':''}">${asm.display}</span>
      <button id="btn-${idx}-assemble" class="btn-timer ${runAsm?'btn-stop':'btn-start'}"
        onclick="toggleTimer(${idx},null,'assemble')">
        ${runAsm?'⏹ STOP':'▶ START'}
      </button>
      <button class="btn-reset" onclick="resetAssemble(${idx})">↺ RESET ALL</button>
    </div>
    <div class="lap-list">${lapsHTML}</div>
    ${conclusionHTML}
  </div>`;
}




function closeFinish(){
  document.getElementById('finish-modal').style.display = 'none';
}

function showFinish(idx){
  const t = teams[idx];
  const sp = t.spear;
  const weaponScore  = sp.assemble.laps.length * 10;
  const kfsR1        = t.forest.R1.confirmed ? t.forest.R1.score : 0;
  const kfsR2        = t.forest.R2.confirmed ? t.forest.R2.score : 0;
  const kfsScore     = kfsR1 + kfsR2;
  const rowPts   = [80, 40, 30];
  const ttcScore = t.place.grid.reduce((sum, c, i) => sum + (c ? rowPts[Math.floor(i/3)] : 0), 0);
  const bottomScore = t.place.grid.slice(6,9).filter(Boolean).length * 30;
  const middleScore = t.place.grid.slice(3,6).filter(Boolean).length * 40;
  const topScore    = t.place.grid.slice(0,3).filter(Boolean).length * 80;
  const total        = weaponScore + kfsScore + ttcScore;

  document.getElementById('finish-team-name').textContent    = t.name;
  document.getElementById('finish-weapon').textContent       = weaponScore;
  document.getElementById('finish-weapon-detail').textContent= `${sp.assemble.laps.length} assembled × 10`;
  document.getElementById('finish-kfs').textContent         = kfsScore;
  document.getElementById('finish-kfs-detail').textContent  = `R1: ${t.forest.R1.confirmed ? t.forest.R1.blocks+' blocks ✓' : 'not confirmed'} · R2: ${t.forest.R2.confirmed ? t.forest.R2.blocks+' blocks ✓' : 'not confirmed'}`;
  document.getElementById('finish-bottom').textContent      = bottomScore;
  document.getElementById('finish-middle').textContent      = middleScore;
  document.getElementById('finish-top').textContent         = topScore;
  document.getElementById('finish-ttc').textContent         = ttcScore;
  document.getElementById('finish-total').textContent       = total;
  document.getElementById('finish-modal').style.display     = 'flex';
}







function toggleExpand(idx){
  teams[idx].expanded = !teams[idx].expanded;
  render();
}

function render(){
  const c = document.getElementById('teams');
  if(!teams.length){ c.innerHTML='<div style="color:var(--mut);text-align:center;padding:40px;font-style:italic">No teams yet — add one above.</div>'; return; }
  c.innerHTML = teams.map((t,idx)=>`
    <div class="team">
      <div class="team-head" onclick="toggleExpand(${idx})" style="cursor:pointer">
        <span class="team-name">▣ ${esc(t.name)}</span>
        <span class="team-chevron">${t.expanded ? '▲' : '▼'}</span>
        <button class="finish-btn" onclick="event.stopPropagation();showFinish(${idx})">🏁 FINISH</button>
        ${t.expanded ? `<button class="reset-team" onclick="event.stopPropagation();resetTeam(${idx})">↺ RESET</button>` : ''}
        <button class="del" onclick="event.stopPropagation();delTeam(${idx})">DELETE</button>
      </div>
      ${t.expanded ? `
      <div class="tabs">
        <button class="tab${t.activeTab==='spear'?' active':''}" onclick="setTab(${idx},'spear')">SPEAR PHASE</button>
        <button class="tab${t.activeTab==='forest'?' active':''}" onclick="setTab(${idx},'forest')">FOREST & PLACE</button>
      </div>
      <div class="tab-content${t.activeTab==='spear'?' active':''}">
        ${renderSpear(idx)}
      </div>
      <div class="tab-content${t.activeTab==='forest'?' active':''}">
        ${renderForestPlace(idx)}
      </div>` : ''}
    </div>`).join('');
}

// ── export ────────────────────────────────────────────────────────────────────
function csvCell(s){ s=String(s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function exportCSV(){
  if(!teams.length){ alert('No data to export'); return; }
  const rows=[['team','phase','round','task','time_s','spears_assembled','score','notes']];
  teams.forEach(t=>{
    const sp = t.spear;
    sp.circles.forEach((c,ci)=>{
      if(c.ms > 0) rows.push([t.name,'spear',`spearhead-${ci+1}`,'spearhead time',(c.ms/1000).toFixed(3),'','','']);
    });
    sp.laps = sp.assemble.laps;
    sp.assemble.laps.forEach((ms,li)=>{
      rows.push([t.name,'spear',`assemble-${li+1}`,'assemble',(ms/1000).toFixed(3),1,10,'']);
    });
    const avgMs = sp.assemble.laps.length ? sp.assemble.laps.reduce((a,b)=>a+b,0)/sp.assemble.laps.length : 0;
    if(sp.assemble.laps.length) rows.push([t.name,'spear','assemble-summary','assemble avg',(avgMs/1000).toFixed(3),sp.assemble.laps.length,sp.assemble.laps.length*10,'']);
    // forest
    ['R1','R2'].forEach(r=>{
      const f = t.forest[r];
      if(f.blocks>0||f.ms>0) rows.push([t.name,'forest',r,'kfs collection',(f.ms/1000).toFixed(3),f.blocks,f.score,f.confirmed?'confirmed':'']);
    });
    // place
    if(t.place.R1.bottom) rows.push([t.name,'place','R1','bottom row','',(t.place.R1.bottom||0),(t.place.R1.bottom||0)*30,'']);
    if(t.place.R2.middle) rows.push([t.name,'place','R2','middle row','',(t.place.R2.middle||0),(t.place.R2.middle||0)*40,'']);
    if(t.place.R2.top)    rows.push([t.name,'place','R2','top row','',(t.place.R2.top||0),(t.place.R2.top||0)*80,'']);
  });
  const csv = rows.map(r=>r.map(csvCell).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'robot_analysis.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('teamInput').addEventListener('keydown',e=>{ if(e.key==='Enter') addTeam(); });
render();
</script>
